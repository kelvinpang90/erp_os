# 生产 / Demo 站点 compose（默认 compose 文件，VPS 上直接 `docker compose ...`）
# 本地开发用 docker-compose.dev.yml（含 mysql / redis / nginx 全栈）。
#
# 前置：
#   1. vps_infra 栈已起（独立仓库），external network proxy_net 和 data_net 已存在
#   2. infra_mysql 已建 erp_os database + erp_app 账号
#   3. ghcr.io 镜像已由 .github/workflows/deploy.yml 推送
#   4. /srv/infra/nginx/conf.d/erp.conf 已就位（见仓库 nginx/conf.d/erp.conf）
#
# service key 必须加 erp_ 前缀，避免与 crm_os 的同名 service（backend/frontend/...）
# 在共享 proxy_net 上产生 DNS 别名冲突。
#
# 启动：
#   cp .env.production.example .env && vim .env
#   docker login ghcr.io
#   docker compose pull
#   docker compose up -d
#   docker compose exec erp_backend alembic upgrade head

x-tz: &tz
  TZ: Asia/Kuala_Lumpur

networks:
  proxy_net:
    external: true
  data_net:
    external: true

services:
  erp_backend:
    image: ghcr.io/${GHCR_OWNER}/erp_os-backend:${IMAGE_TAG:-latest}
    container_name: erp_backend
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *tz
    volumes:
      - uploads_data:/app/uploads
    networks: [proxy_net, data_net]
    # 不发布 host 端口；nginx 通过 proxy_net 访问 erp_backend:8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  erp_celery_worker:
    image: ghcr.io/${GHCR_OWNER}/erp_os-backend:${IMAGE_TAG:-latest}
    container_name: erp_celery_worker
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *tz
    command: celery -A app.tasks.celery_app worker -l info -Q default,ai
    volumes:
      - uploads_data:/app/uploads
    networks: [data_net]
    depends_on:
      erp_backend:
        condition: service_healthy

  erp_celery_beat:
    image: ghcr.io/${GHCR_OWNER}/erp_os-backend:${IMAGE_TAG:-latest}
    container_name: erp_celery_beat
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *tz
    command: celery -A app.tasks.celery_app beat -l info
    networks: [data_net]
    depends_on:
      erp_backend:
        condition: service_healthy

  erp_frontend:
    image: ghcr.io/${GHCR_OWNER}/erp_os-frontend:${IMAGE_TAG:-latest}
    container_name: erp_frontend
    restart: unless-stopped
    environment:
      <<: *tz
    networks: [proxy_net]
    # 静态 SPA，容器活着即服务正常；不配 healthcheck（与 crm_os-frontend 一致）

volumes:
  uploads_data:
