# ERP vhost 模板（部署到 VPS 后复制为 erp.conf，把 erp.example.com 改成真实域名）

server {
    listen 80;
    server_name erp.kelvinpeng.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name erp.kelvinpeng.com;

    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 25M;

    # 用变量驱动 proxy_pass，强制走 nginx.conf 里的 resolver（Docker 127.0.0.11），
    # 每次请求重新解析容器 IP；避免容器重建后 nginx 缓存旧 IP 返回 502。
    set $erp_backend  "erp_backend:8000";
    set $erp_frontend "erp_frontend:80";

    # 安全 header
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check
    location = /health {
        access_log off;
        proxy_pass http://$erp_backend/health;
        proxy_set_header Host $host;
    }

    # API
    # ⚠️ 同 frontend location:proxy_pass URL 含变量时,末尾不能加 URI,
    # 否则 /api/auth/login 会被改写成 /api/,backend 返 404。
    location /api/ {
        proxy_pass http://$erp_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;

        # SSE（OCR 流式进度）— 必须关 buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # OpenAPI docs（生产建议加 IP 白名单或 basic auth；演示站点先放开）
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass http://$erp_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    # 静态文件下发（受控文件接口）—— 同样去掉尾 URI
    location /api/files/ {
        proxy_pass http://$erp_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering on;
    }

    # Frontend SPA（erp_frontend 是 nginx-static 镜像，已做 try_files 兜底）
    #
    # ⚠️ proxy_pass 末尾绝对不能加 "/"。
    # 当 proxy_pass URL 含变量（$erp_frontend）时，nginx 会用 proxy_pass 里的
    # URI 整体替换 request URI。写成 http://$erp_frontend/; 会导致
    # /assets/foo.js 被改写成 /，内层 nginx try_files 回退返回 index.html
    # （text/html），浏览器把 HTML 当 JS 执行 → 白屏。
    # 不带尾 / 时，原 request URI 完整透传给后端。详见 tasks/lessons.md。
    location / {
        proxy_pass http://$erp_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
