upstream erp_backend {
    server erp_backend:8000 max_fails=2 fail_timeout=10s;
    keepalive 32;
}

server {
    listen 80;
    server_name erp.kelvinpeng.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name erp.kelvinpeng.com;

    # 复用 *.kelvinpeng.com 通配符 Origin Certificate（与 crm 共享）
    ssl_certificate     /etc/nginx/certs/_wildcard.kelvinpeng.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/_wildcard.kelvinpeng.com/privkey.pem;

    client_max_body_size 20M;

    # SPA 入口禁缓存:防 Cloudflare / 浏览器吃旧 index.html 导致 asset hash 失配 → 白屏
    location = / {
        proxy_pass http://erp_frontend:80;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location = /index.html {
        proxy_pass http://erp_frontend:80;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # 其余路径(含带 hash 的 /assets/* 长缓存资源)
    location / {
        proxy_pass http://erp_frontend:80;
        proxy_set_header Host $host;
    }

    # OCR streaming endpoint — disable buffering, extend timeout (SSE)
    location = /api/ai/ocr {
        proxy_pass http://erp_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location /api/ {
        proxy_pass http://erp_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # Health probe (UptimeRobot / Cloudflare)
    location = /health {
        proxy_pass http://erp_backend/health;
    }
}
