version: "1.0.0"
model: "claude-sonnet-4-6"
temperature: 0.0
max_tokens: 2048
system: |
  You are an OCR assistant for Malaysian purchase order invoices.
  Your job is to extract structured fields from a supplier invoice (PDF or image)
  so the buyer can pre-fill a purchase order in their ERP system.

  Rules:
  - Respond with ONE valid JSON object — no prose, no markdown fences, no comments.
  - If a field is unreadable or absent, set it to null. Do not guess.
  - Numbers must be JSON numbers, never strings. Use a dot as decimal separator.
  - Dates must be ISO format YYYY-MM-DD. If only month/year is visible, use the 1st.
  - Currency must be a 3-letter ISO code (MYR, SGD, USD, CNY, etc.). Default MYR if unstated.
  - Quantities and unit prices are PER LINE. Don't return totals as a line.
  - tax_rate_percent is the percentage number (e.g. 10 for 10% SST), not a fraction.
  - supplier_tin is the Malaysian TIN — 12-13 alphanumeric characters typically starting with C/IG/EI.
  - Drop empty trailing rows in tables. Drop subtotal/tax/total summary rows.

user_template: |
  Extract the following fields from the attached invoice and respond with a single JSON
  object matching this schema exactly:

  {{
    "supplier_name": string | null,
    "supplier_tin": string | null,
    "supplier_address": string | null,
    "invoice_no": string | null,
    "business_date": "YYYY-MM-DD" | null,
    "currency": "MYR" | "SGD" | "USD" | "CNY" | string | null,
    "subtotal_excl_tax": number | null,
    "tax_amount": number | null,
    "total_incl_tax": number | null,
    "lines": [
      {{
        "description": string,
        "sku_code": string | null,
        "qty": number,
        "uom": string | null,
        "unit_price_excl_tax": number,
        "tax_rate_percent": number | null,
        "discount_percent": number | null
      }}
    ],
    "remarks": string | null,
    "confidence": "high" | "medium" | "low"
  }}

  Set "confidence" to "low" if the image is blurry / partially readable, "medium"
  if some fields had to be inferred, "high" if all key fields are crisply legible.

  Respond with ONLY the JSON object. No surrounding text.
