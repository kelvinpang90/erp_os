# Redis 7 共享实例配置
# 多项目分配 db 编号区段（每项目 16 个 db）：
#   erp:   0-15
#   app2:  16-31
#   app3:  32-47

bind 0.0.0.0
protected-mode no
port 6379

databases 256

# 持久化（AOF + RDB）
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

save 900 1
save 300 10
save 60 10000

# 内存上限（VPS 1-2GB 内存场景）
maxmemory 512mb
maxmemory-policy allkeys-lru

# 慢查询
slowlog-log-slower-than 10000
slowlog-max-len 128

# 安全
# 如需开放跨主机访问，改 bind 并设 requirepass 强密码
# requirepass CHANGE_ME

# 关掉危险命令（生产可选）
# rename-command FLUSHALL ""
# rename-command FLUSHDB  ""
# rename-command CONFIG   ""
