name: PR check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend lint + tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpw
          MYSQL_DATABASE: erp_os_test
        ports: ["3306:3306"]
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -ptestpw"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        working-directory: backend
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff
        working-directory: backend
        run: ruff check app tests
      - name: Mypy
        working-directory: backend
        run: mypy app
      - name: Pytest
        working-directory: backend
        env:
          DATABASE_URL: mysql+aiomysql://root:testpw@127.0.0.1:3306/erp_os_test
          REDIS_HOST: 127.0.0.1
          SECRET_KEY: test-secret-key-not-for-production
          ENVIRONMENT: test
        run: pytest --cov=app --cov-report=xml -q
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Vitest
        working-directory: frontend
        run: npm test -- --run
      - name: Build
        working-directory: frontend
        run: npm run build

  openapi-contract:
    name: OpenAPI ↔ TS client drift check
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Dump openapi.json
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          SECRET_KEY: ci-key
        run: |
          python -c "import json; from app.main import app; print(json.dumps(app.openapi()))" > ../frontend/openapi.json
      - name: Regenerate TS client and diff
        working-directory: frontend
        run: |
          npm run gen:api
          if ! git diff --quiet src/api/generated; then
            echo "::error::frontend/src/api/generated is out of sync with backend openapi.json. Run 'npm run gen:api' and commit."
            git --no-pager diff src/api/generated | head -100
            exit 1
          fi
