name: Deploy ERP

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image owner
        id: meta
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/erp_os-backend:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/erp_os-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          target: production
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/erp_os-frontend:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/erp_os-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: demo
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd /opt/erp_os
            git pull --ff-only
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose exec -T erp_backend alembic upgrade head
            docker logout ghcr.io
            docker image prune -f

      - name: Smoke test (via subdomain)
        env:
          ERP_PUBLIC_URL: ${{ secrets.ERP_PUBLIC_URL }}
        run: |
          if [ -z "${ERP_PUBLIC_URL:-}" ]; then
            echo "::warning::ERP_PUBLIC_URL secret not set — skipping smoke test."
            exit 0
          fi
          curl -fsS --max-time 10 "${ERP_PUBLIC_URL%/}/health" | tee /dev/stderr | grep -q '"status"'
