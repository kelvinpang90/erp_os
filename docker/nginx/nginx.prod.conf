upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # Cloudflare terminates HTTPS upstream; the X-Forwarded-Proto header is
    # what FastAPI sees as the original scheme.
    client_max_body_size 25M;

    # Health
    location = /health {
        proxy_pass http://backend/health;
        proxy_set_header Host $host;
    }

    # FastAPI under /api
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming endpoints — buffering must stay off
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # OpenAPI (kept available for orval contract checks against demo)
    location = /openapi.json {
        proxy_pass http://backend/openapi.json;
        proxy_set_header Host $host;
    }

    # Static SPA — served by the frontend container's internal nginx.
    location / {
        proxy_pass http://frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
